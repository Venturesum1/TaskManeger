<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:#F9FAFB;padding:32px 16px}.wrap{max-width:560px;margin:0 auto}.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:36px}.label{font-size:11px;font-weight:600;color:#EF4444;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}.title{font-size:22px;font-weight:700;color:#111827;margin-bottom:24px}.alert{background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;padding:14px 18px;margin-bottom:24px;font-size:14px;color:#DC2626;font-weight:600}.info{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:18px;margin-bottom:24px}.row{font-size:13px;color:#6B7280;margin-bottom:6px}.row strong{color:#111827}.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600}.badge-high{background:#FEE2E2;color:#DC2626}.badge-medium{background:#FEF3C7;color:#D97706}.badge-low{background:#D1FAE5;color:#065F46}.btn{display:inline-block;background:#EF4444;color:#fff;padding:11px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}.footer{margin-top:28px;font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6;padding-top:20px}</style>
</head><body><div class="wrap"><div class="card">
<p class="label">⚠️ Overdue Alert · {{companyName}}</p>
<h1 class="title">Task Is Overdue</h1>
<div class="alert">This task has passed its deadline and requires immediate attention.</div>
<div class="info">
  <p class="row"><strong>{{taskTitle}}</strong></p>
  <p class="row">👤 Owner: <strong>{{ownerName}}</strong></p>
  <p class="row">📅 Was due: <strong>{{dueDate}}</strong></p>
  {{#if priority}}<p class="row" style="margin-top:8px">Priority: <span class="badge badge-{{priority}}">{{priorityLabel}}</span></p>{{/if}}
</div>
<a href="{{appUrl}}/tasks" class="btn">Update Task Now</a>
<div class="footer"><p>{{companyName}} · {{year}}</p></div>
</div></div></body></html>
