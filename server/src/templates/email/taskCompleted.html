<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:#F9FAFB;padding:32px 16px}.wrap{max-width:560px;margin:0 auto}.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:36px}.label{font-size:11px;font-weight:600;color:#6B7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}.title{font-size:22px;font-weight:700;color:#111827;margin-bottom:12px}.body{font-size:14px;color:#6B7280;margin-bottom:24px;line-height:1.6}.banner{background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;padding:14px 18px;margin-bottom:24px;font-size:14px;color:#065F46;font-weight:500}.btn{display:inline-block;background:#6366F1;color:#fff;padding:11px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}.footer{margin-top:28px;font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6;padding-top:20px}</style>
</head><body><div class="wrap"><div class="card">
<p class="label">Task Update · {{companyName}}</p>
<h1 class="title">✅ Task Completed</h1>
<div class="banner">🎉 "<strong>{{taskTitle}}</strong>" has been marked as completed{{#if completedBy}} by <strong>{{completedBy}}</strong>{{/if}}.</div>
<p class="body">Great work! The task has been successfully completed. View the full task details in the dashboard.</p>
<a href="{{appUrl}}/tasks" class="btn">View Tasks</a>
<div class="footer"><p>{{companyName}} · {{year}}</p></div>
</div></div></body></html>
