<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,system-ui,sans-serif;background:#F9FAFB;padding:32px 16px}.wrap{max-width:560px;margin:0 auto}.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:36px}.label{font-size:11px;font-weight:600;color:#6B7280;letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px}.title{font-size:22px;font-weight:700;color:#111827;margin-bottom:12px}.body{font-size:14px;color:#6B7280;margin-bottom:24px;line-height:1.6}.btn{display:inline-block;background:#6366F1;color:#fff;padding:11px 28px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}.footer{margin-top:28px;font-size:12px;color:#9CA3AF;border-top:1px solid #F3F4F6;padding-top:20px}</style>
</head><body><div class="wrap"><div class="card">
<p class="label">Welcome · {{companyName}}</p>
<h1 class="title">Hi {{name}}, welcome aboard! 👋</h1>
<p class="body">Your account has been created on <strong>{{companyName}}</strong>. You can now log in and start managing tasks and meetings with your team.</p>
<a href="{{appUrl}}/login" class="btn">Log In Now</a>
<div class="footer"><p>{{companyName}} — Task &amp; Meeting Management · {{year}}</p></div>
</div></div></body></html>
